<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="lightGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3DBE6E"/>
      <stop offset="100%" style="stop-color:#28A055"/>
    </linearGradient>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF8F1"/>
      <stop offset="100%" style="stop-color:#E0F2E8"/>
    </linearGradient>
  </defs>

  <!-- Soft green background -->
  <rect x="0" y="0" width="32" height="32" rx="7" ry="7" fill="url(#bgGrad)"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" ry="6.5" fill="none" stroke="#A8DDB8" stroke-width="1"/>

  <!-- Green circle -->
  <circle cx="16" cy="16" r="12" fill="url(#lightGreen)"/>

  <!-- ₹ symbol in white -->
  <text x="16" y="17"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="14"
        font-weight="700"
        fill="#FFFFFF"
        text-anchor="middle"
        dominant-baseline="middle">₹</text>

  <!-- Four tiny gold dots -->
  <circle cx="16" cy="3"  r="1.2" fill="#D4A030"/>
  <circle cx="16" cy="29" r="1.2" fill="#D4A030"/>
  <circle cx="3"  cy="16" r="1.2" fill="#D4A030"/>
  <circle cx="29" cy="16" r="1.2" fill="#D4A030"/>
</svg>
