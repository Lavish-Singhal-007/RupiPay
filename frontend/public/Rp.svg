<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
    </style>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DBF65"/>
      <stop offset="100%" style="stop-color:#1A9E50"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C89428"/>
      <stop offset="100%" style="stop-color:#A87420"/>
    </linearGradient>
  </defs>

  <!-- Ghost outer ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#2DBF65" stroke-width="1" opacity="0.2"/>
  <!-- Main circle -->
  <circle cx="50" cy="50" r="36" fill="url(#circleGrad)"/>
  <circle cx="50" cy="50" r="36" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>

  <!-- ₹ white -->
  <text x="50" y="53"
        font-family="'Playfair Display', 'Georgia', serif"
        font-size="32"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="middle">₹</text>

  <!-- Gold cardinal dots -->
  <circle cx="50" cy="10"  r="3" fill="url(#goldGrad)"/>
  <circle cx="50" cy="90"  r="3" fill="url(#goldGrad)"/>
  <circle cx="10" cy="50"  r="3" fill="url(#goldGrad)"/>
  <circle cx="90" cy="50"  r="3" fill="url(#goldGrad)"/>

  <!-- "Rupi" dark green -->
  <text x="112" y="65"
        font-family="'Playfair Display', 'Georgia', serif"
        font-size="52"
        font-weight="700"
        letter-spacing="1"
        fill="#0E3D22">Rupi</text>

  <!-- "Pay" gold -->
  <text x="270" y="65"
        font-family="'Playfair Display', 'Georgia', serif"
        font-size="52"
        font-weight="700"
        letter-spacing="2"
        fill="url(#goldGrad)">Pay</text>

</svg>
