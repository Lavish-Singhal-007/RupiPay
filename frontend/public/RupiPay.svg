<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 110" width="520" height="110">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF7F0"/>
      <stop offset="100%" style="stop-color:#D8F0E3"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DBF65"/>
      <stop offset="100%" style="stop-color:#1A9E50"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C89428"/>
      <stop offset="100%" style="stop-color:#A87420"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-10%" width="112%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1A7A40" flood-opacity="0.12"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="520" height="110" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Card -->
  <rect x="0" y="0" width="520" height="110" rx="16" ry="16" fill="url(#bgGrad)" filter="url(#cardShadow)"/>

  <g clip-path="url(#cardClip)">
    <!-- Top accent bar -->
    <rect x="0" y="0" width="520" height="4" fill="#2DBF65"/>

    <!-- Ghost outer ring -->
    <circle cx="72" cy="57" r="50" fill="none" stroke="#2DBF65" stroke-width="1" opacity="0.25"/>
    <!-- Main circle -->
    <circle cx="72" cy="57" r="38" fill="url(#circleGrad)"/>
    <circle cx="72" cy="57" r="38" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>

    <!-- ₹ white -->
    <text x="72" y="60"
          font-family="'Playfair Display', 'Georgia', serif"
          font-size="36"
          font-weight="700"
          fill="#ffffff"
          text-anchor="middle"
          dominant-baseline="middle">₹</text>

    <!-- Gold cardinal dots -->
    <circle cx="72"  cy="14"  r="3.5" fill="url(#goldGrad)"/>
    <circle cx="72"  cy="100" r="3.5" fill="url(#goldGrad)"/>
    <circle cx="28"  cy="57"  r="3.5" fill="url(#goldGrad)"/>
    <circle cx="116" cy="57"  r="3.5" fill="url(#goldGrad)"/>

    <!-- "Rupi" dark green -->
    <text x="148" y="72"
          font-family="'Playfair Display', 'Georgia', serif"
          font-size="54"
          font-weight="700"
          letter-spacing="1"
          fill="#0E3D22">Rupi</text>

    <!-- "Pay" gold -->
    <text x="308" y="72"
          font-family="'Playfair Display', 'Georgia', serif"
          font-size="54"
          font-weight="700"
          letter-spacing="2"
          fill="url(#goldGrad)">Pay</text>

  </g>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="519" height="109" rx="15.5" ry="15.5" fill="none" stroke="#7DC898" stroke-width="2"/>
</svg>
