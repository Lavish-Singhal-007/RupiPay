<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&amp;display=swap');
    </style>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DBF65"/>
      <stop offset="100%" style="stop-color:#1A9E50"/>
    </linearGradient>
  </defs>

  <!-- Circle icon — radius 34, centred at (40, 40) -->
  <circle cx="40" cy="40" r="34" fill="url(#circleGrad)"/>

  <!-- ₹ white, centred in circle -->
  <text x="40" y="40"
        font-family="'Montserrat', 'Arial', sans-serif"
        font-size="28"
        font-weight="800"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="central">₹</text>

  <!-- "Rupi" starts 16px after circle ends (40+34+16 = 90) -->
  <text x="90" y="40"
        font-family="'Montserrat', 'Arial', sans-serif"
        font-size="44"
        font-weight="800"
        fill="#0E3D22"
        dominant-baseline="central">Rupi</text>

  <!-- "Pay" — 8px gap after "Rupi" (~118px wide at font-size 44) -->
  <text x="214" y="40"
        font-family="'Montserrat', 'Arial', sans-serif"
        font-size="44"
        font-weight="400"
        fill="#2DBF65"
        dominant-baseline="central">Pay</text>

</svg>
